apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: smart-healthcare
type: Opaque
stringData:
  JWT_SECRET: "your_jwt_secret"
  INTERNAL_SERVICE_SECRET: "your_internal_service_secret"

  AUTH_SERVICE_URL: "http://auth-service:5002"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:5001"
  DOCTOR_SERVICE_URL: "http://doctor-service:5003"
  PATIENT_SERVICE_URL: "http://patient-service:5005"
  NOTIFICATION_SERVICE_URL: "http://notification-service:5004"
  PAYMENT_SERVICE_URL: "http://payment-service:5006"
  TELEMEDICINE_SERVICE_URL: "http://telemedicine-service:5007"
  AI_SYMPTOM_SERVICE_URL: "http://ai-symptom-service:5010"

  AUTH_MONGO_URI: "your_auth_mongodb_uri"
  APPOINTMENT_MONGO_URI: "your_appointment_mongodb_uri"
  DOCTOR_MONGO_URI: "your_doctor_mongodb_uri"
  PATIENT_MONGO_URI: "your_patient_mongodb_uri"
  NOTIFICATION_MONGO_URI: "your_notification_mongodb_uri"
  PAYMENT_MONGO_URI: "your_payment_mongodb_uri"
  TELEMEDICINE_MONGO_URI: "your_telemedicine_mongodb_uri"
  AI_SYMPTOM_MONGO_URI: "your_ai_symptom_mongodb_uri"

  CLOUDINARY_CLOUD_NAME: "your_cloudinary_cloud_name"
  CLOUDINARY_API_KEY: "your_cloudinary_api_key"
  CLOUDINARY_API_SECRET: "your_cloudinary_api_secret"

  GEMINI_API_KEY: "your_gemini_api_key"
  GEMINI_MODEL: "gemini-2.5-flash"