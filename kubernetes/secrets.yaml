apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: smart-healthcare
type: Opaque
stringData:
  AUTH_PORT: "5002"
  DOCTOR_PORT: "5003"
  NOTIFICATION_PORT: "5004"
  PATIENT_PORT: "5005"
  PAYMENT_PORT: "5006"
  TELEMEDICINE_PORT: "5007"
  APPOINTMENT_PORT: "5001"
  AI_SYMPTOM_PORT: "5010"

  JWT_SECRET: "your_jwt_secret"
  INTERNAL_SERVICE_SECRET: "your_internal_secret"

  MONGO_URI_AUTH: "your_auth_mongodb_uri"
  MONGO_URI_DOCTOR: "your_doctor_mongodb_uri"
  MONGO_URI_NOTIFICATION: "your_notification_mongodb_uri"
  MONGO_URI_PATIENT: "your_patient_mongodb_uri"
  MONGO_URI_PAYMENT: "your_payment_mongodb_uri"
  MONGO_URI_TELEMEDICINE: "your_telemedicine_mongodb_uri"
  MONGO_URI_APPOINTMENT: "your_appointment_mongodb_uri"
  MONGO_URI_AI_SYMPTOM: "your_ai_symptom_mongodb_uri"

  CLOUDINARY_CLOUD_NAME: "your_cloudinary_name"
  CLOUDINARY_API_KEY: "your_cloudinary_api_key"
  CLOUDINARY_API_SECRET: "your_cloudinary_api_secret"

  GEMINI_API_KEY: "your_gemini_api_key"
  GEMINI_MODEL: "gemini-2.5-flash"