apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: smart-healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: smart-healthcare-platform-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80